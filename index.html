<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


</head>
  <body class="font-display bg-gray-900 ">
    <div class="w-full h-200 flex flex-col justify-center items-center">
      <!-- button part -->
      <div class="flex flex-row justify-between items-center h-30 w-200">
        <div class="font-bold text-3xl text-white">Task List</div>
        <div>
          <button
            id="btn_add"
            class="bg-red-500 px-10 py-3 rounded-full text-white font-bold hover:bg-red-600 focus:outline-red-200 focus:outline-2 focus:outline-offset-2">
            Add Task
          </button>
        </div>
      </div>

      <table class="w-200 border-separate border-spacing-y-3 font-semibold">
        <thead class="bg-white h-15 text-2xl">
          <tr class>
            <th class="rounded-l-full text-left px-5">Task</th>
            <th>Priority</th>
            <th>Status</th>
            <th class="rounded-r-full">Actions</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>

      <!-- ADD Card -->
      <div id="card"
        class="w-125 h-100 bg-white rounded-4xl fixed p-7 hover:shadow hover:shadow-2xl hover:shadow-red-600 transition-all hidden gap-5">

        <form action class="w-full h-full flex flex-col justify-start items-start gap-3">
          <div class="flex justify-between items-center w-full">
            <div class="text-2xl font-bold"> Task </div> 
            <button id="btn_close" type="button"><i class="fa-solid fa-xmark"></i></button>
          </div>
          <input
            type="text"
            required
            name="ftaskname"
            id="ftaskname"
            class="w-100 h-10 border border-red-400 rounded-[10px] mt-3 px-2 py-1 mb-5" />


            <!-- start priority -->
          <label for="Priority" class="text-2xl font-bold"> Priority </label>

          <div class="w-full flex justify-start items-center gap-5">
            <div>
              <input required type="radio" class="peer sr-only" name="priority_radio" id="priority-high" value="High">
              <label for="priority-high" class="w-25 h-10 border-2 rounded-2xl border-red-500 text-red-500 flex items-center justify-center cursor-pointer
            peer-checked:bg-red-500 peer-checked:text-white hover:bg-red-500  hover:text-white">High</label>
            </div>

            <div>
              <input required type="radio" class="peer sr-only" name="priority_radio" id="priority-medium" value="Medium">
              <label for="priority-medium" class="w-25 h-10 border-2 rounded-2xl border-yellow-500 text-yellow-500 flex items-center justify-center cursor-pointer
            peer-checked:bg-yellow-500 peer-checked:text-white hover:bg-yellow-500  hover:text-white">medium</label>
            </div>

            <div>
              <input required type="radio" class="peer sr-only" name="priority_radio" id="priority-low" value="Low">
              <label for="priority-low" class="w-25 h-10 border-2 rounded-2xl border-green-500 text-green-500 flex items-center justify-center cursor-pointer
            peer-checked:bg-green-500 peer-checked:text-white hover:bg-green-500 hover:text-white">Low</label>
            </div>
            
          </div>
          <!-- end priority -->

          <!-- start status -->

          <label for="status" class="text-2xl font-bold"> Status </label>

          <div class="w-full flex justify-start items-center gap-5">
            <div>
              <input required type="radio" class="peer sr-only" name="status_radio" id="status-todo" value="To Do">
              <label for="status-todo" class="w-25 h-10 border-2 rounded-2xl border-blue-500 text-blue-500 flex items-center justify-center cursor-pointer
            peer-checked:bg-blue-500 peer-checked:text-white hover:bg-blue-500 hover:text-white ">Todo</label>
            </div>

            <div>
              <input required type="radio" class="peer sr-only" name="status_radio" id="status-progress" value="Progress">
              <label for="status-progress" class="w-25 h-10 border-2 rounded-2xl border-blue-500 text-blue-500 flex items-center justify-center cursor-pointer
            peer-checked:bg-blue-500 peer-checked:text-white hover:bg-blue-500 hover:text-white">Progress</label>
            </div>

            <div>
              <input required type="radio" class="peer sr-only" name="status_radio" id="status-done" value="Done">
              <label for="status-done" class="w-25 h-10 border-2 rounded-2xl border-blue-500 text-blue-500 flex items-center justify-center cursor-pointer
            peer-checked:bg-blue-500 peer-checked:text-white hover:bg-blue-500 hover:text-white">Done</label>
            </div>
            <!-- end status -->

          </div>


          <!-- end status -->

            <div class="flex justify-end items-center w-full">
              <button id="btn_submit" type="button" class="bg-purple-500 text-white font-bold w-20 h-10 rounded-2xl hover:bg-purple-800">Add</button>
            </div>
        </div>
          <!-- end add card -->
            

    </div>

    <script src="./src/script.js"></script>
  </body>
</html>
